name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: plantpal
          POSTGRES_PASSWORD: plantpal
          POSTGRES_DB: plantpal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plantpal -d plantpal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://plantpal:plantpal@localhost:5432/plantpal
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check app tests

      - name: Run migrations
        run: alembic upgrade head

      - name: Test
        run: pytest --cov=app
